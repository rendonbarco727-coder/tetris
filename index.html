<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    body {
      font-family: 'Press Start 2P', sans-serif;
      background-color: #1a1a2e;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      margin: 40px auto;
    }
    #gameCanvas {
      border: 2px solid #39ff14;
      background-color: #1a1a2e;
    }
    #controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #444;
    }
    #score-display {
      font-size: 24px;
      color: #fff;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="score-display">Puntuación: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="controls">
      <div></div>
      <button class="btn" id="up-btn">↑</button>
      <div></div>
      <button class="btn" id="left-btn">←</button>
      <div></div>
      <button class="btn" id="right-btn">→</button>
      <div></div>
      <button class="btn" id="down-btn">↓</button>
      <div></div>
    </div>
  </div>
  <script>
    const CELL = 20, COLS = 20, ROWS = 20;
    let snake, dir, nextDir, food, score, speed, gameState, animId;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const upBtn = document.getElementById('up-btn');
    const downBtn = document.getElementById('down-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    function resetGame() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0}; nextDir = {x:1,y:0};
      score = 0; speed = 150; gameState = 'start';
      spawnFood(); cancelAnimationFrame(animId);
    }

    function spawnFood() {
      do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
      while (snake.some(s=>s.x===food.x&&s.y===food.y));
    }

    let lastTime = 0;
    function loop(ts) {
      animId = requestAnimationFrame(loop);
      if (ts - lastTime < speed) return;
      lastTime = ts;
      dir = nextDir;
      const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
      if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        gameState='gameover'; drawGameOver(); return;
      }
      snake.unshift(head);
      if (head.x===food.x&&head.y===food.y) { score+=10; speed=Math.max(60,speed-2); spawnFood(); }
      else snake.pop();
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < snake.length; i++) {
        const s = snake[i];
        ctx.fillStyle = `hsl(${i * 10}, 100%, 50%)`;
        ctx.fillRect(s.x * CELL, s.y * CELL, CELL, CELL);
      }
      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2, 0, 2 * Math.PI);
      ctx.fill();
      scoreDisplay.textContent = `Puntuación: ${score}`;
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '24px Press Start 2P';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`Game Over! Puntuación: ${score}`, canvas.width / 2, canvas.height / 2);
      ctx.font = '18px Press Start 2P';
      ctx.fillText('Presiona el botón para reiniciar', canvas.width / 2, canvas.height / 2 + 30);
      const restartBtn = document.createElement('button');
      restartBtn.textContent = '🔄 Reiniciar';
      restartBtn.style.position = 'absolute';
      restartBtn.style.top = '50%';
      restartBtn.style.left = '50%';
      restartBtn.style.transform = 'translate(-50%, -50%)';
      restartBtn.style.padding = '10px 20px';
      restartBtn.style.border = 'none';
      restartBtn.style.borderRadius = '10px';
      restartBtn.style.background = '#333';
      restartBtn.style.color = '#fff';
      restartBtn.style.cursor = 'pointer';
      document.body.appendChild(restartBtn);
      restartBtn.addEventListener('click', () => {
        document.body.removeChild(restartBtn);
        resetGame();
        loop();
      });
    }

    function drawStartScreen() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = '24px Press Start 2P';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Tetris', canvas.width / 2, canvas.height / 2);
      ctx.font = '18px Press Start 2P';
      ctx.fillText('Presiona el botón para iniciar', canvas.width / 2, canvas.height / 2 + 30);
      const startBtn = document.createElement('button');
      startBtn.textContent = '▶ Iniciar';
      startBtn.style.position = 'absolute';
      startBtn.style.top = '50%';
      startBtn.style.left = '50%';
      startBtn.style.transform = 'translate(-50%, -50%)';
      startBtn.style.padding = '10px 20px';
      startBtn.style.border = 'none';
      startBtn.style.borderRadius = '10px';
      startBtn.style.background = '#333';
      startBtn.style.color = '#fff';
      startBtn.style.cursor = 'pointer';
      document.body.appendChild(startBtn);
      startBtn.addEventListener('click', () => {
        document.body.removeChild(startBtn);
        resetGame();
        loop();
      });
    }

    upBtn.addEventListener('click', () => {
      if (dir.y !== 1) nextDir = {x: 0, y: -1};
    });
    downBtn.addEventListener('click', () => {
      if (dir.y !== -1) nextDir = {x: 0, y: 1};
    });
    leftBtn.addEventListener('click', () => {
      if (dir.x !== 1) nextDir = {x: -1, y: 0};
    });
    rightBtn.addEventListener('click', () => {
      if (dir.x !== -1) nextDir = {x: 1, y: 0};
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === 'w') {
        if (dir.y !== 1) nextDir = {x: 0, y: -1};
      } else if (e.key === 'ArrowDown' || e.key === 's') {
        if (dir.y !== -1) nextDir = {x: 0, y: 1};
      } else if (e.key === 'ArrowLeft' || e.key === 'a') {
        if (dir.x !== 1) nextDir = {x: -1, y: 0};
      } else if (e.key === 'ArrowRight' || e.key === 'd') {
        if (dir.x !== -1) nextDir = {x: 1, y: 0};
      }
    });

    drawStartScreen();
  </script>
</body>
</html>
