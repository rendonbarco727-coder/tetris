<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    body {
      font-family: 'Press Start 2P', sans-serif;
      background-color: #1a1a2e;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #gameCanvas {
      border: 2px solid #39ff14;
      max-width: 100%;
    }
    #controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    #controls button {
      border: none;
      border-radius: 10px;
      background-color: #333;
      color: #fff;
      padding: 10px;
      cursor: pointer;
    }
    #controls button:hover {
      background-color: #444;
    }
    #score-display {
      font-size: 24px;
      color: #fff;
      margin-bottom: 10px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div id="score-display">Puntuación: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="controls">
      <button id="up-btn">↑</button>
      <button id="left-btn">←</button>
      <button id="right-btn">→</button>
      <button id="down-btn">↓</button>
    </div>
  </div>
  <script>
    const CELL = 20, COLS = 10, ROWS = 20;
    let tetromino, dir, nextDir, score, speed, gameState, animId;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const upBtn = document.getElementById('up-btn');
    const downBtn = document.getElementById('down-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    function resetGame() {
      tetromino = {
        x: Math.floor(COLS / 2),
        y: 0,
        type: Math.floor(Math.random() * 7),
        rotation: 0
      };
      dir = {x: 0, y: 1}; nextDir = {x: 0, y: 1};
      score = 0; speed = 500; gameState = 'start';
      cancelAnimationFrame(animId);
    }

    function spawnTetromino() {
      tetromino = {
        x: Math.floor(COLS / 2),
        y: 0,
        type: Math.floor(Math.random() * 7),
        rotation: 0
      };
    }

    let lastTime = 0;
    function loop(ts) {
      animId = requestAnimationFrame(loop);
      if (ts - lastTime < speed) return;
      lastTime = ts;
      dir = nextDir;
      if (gameState === 'playing') {
        if (checkCollision(tetromino, dir)) {
          if (dir.y === 1) {
            placeTetromino(tetromino);
            spawnTetromino();
          } else {
            tetromino.x += dir.x;
          }
        } else {
          tetromino.x += dir.x;
          tetromino.y += dir.y;
        }
      }
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (gameState === 'start') {
        ctx.font = '24px Press Start 2P';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Tetris', canvas.width / 2, canvas.height / 2);
        ctx.font = '18px Press Start 2P';
        ctx.fillText('Toca para iniciar', canvas.width / 2, canvas.height / 2 + 30);
      } else if (gameState === 'gameover') {
        drawGameOver();
      } else {
        ctx.fillStyle = '#0f0';
        ctx.font = '18px Press Start 2P';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(`Puntuación: ${score}`, 10, 10);
        drawTetromino(tetromino);
        drawGrid();
      }
    }

    function drawTetromino(tetromino) {
      const shapes = [
        [
          [0, 0],
          [1, 0],
          [2, 0],
          [3, 0]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 1],
          [2, 1]
        ],
        [
          [0, 1],
          [1, 1],
          [2, 1],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [2, 1]
        ],
        [
          [1, 0],
          [2, 0],
          [0, 1],
          [1, 1]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 0],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [1, 2]
        ]
      ];
      const shape = shapes[tetromino.type];
      for (let i = 0; i < shape.length; i++) {
        ctx.fillStyle = `hsl(${i * 10}, 100%, 50%)`;
        ctx.fillRect((tetromino.x + shape[i][0]) * CELL, (tetromino.y + shape[i][1]) * CELL, CELL, CELL);
      }
    }

    function drawGrid() {
      for (let i = 0; i < COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL, 0);
        ctx.lineTo(i * CELL, ROWS * CELL);
        ctx.strokeStyle = '#333';
        ctx.stroke();
      }
      for (let i = 0; i < ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * CELL);
        ctx.lineTo(COLS * CELL, i * CELL);
        ctx.strokeStyle = '#333';
        ctx.stroke();
      }
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '24px Press Start 2P';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
      ctx.font = '18px Press Start 2P';
      ctx.fillText(`Puntuación: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
      ctx.font = '18px Press Start 2P';
      ctx.fillText('🔄 Reiniciar', canvas.width / 2, canvas.height / 2 + 60);
    }

    function checkCollision(tetromino, dir) {
      const shapes = [
        [
          [0, 0],
          [1, 0],
          [2, 0],
          [3, 0]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 1],
          [2, 1]
        ],
        [
          [0, 1],
          [1, 1],
          [2, 1],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [2, 1]
        ],
        [
          [1, 0],
          [2, 0],
          [0, 1],
          [1, 1]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 0],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [1, 2]
        ]
      ];
      const shape = shapes[tetromino.type];
      for (let i = 0; i < shape.length; i++) {
        if (tetromino.x + shape[i][0] + dir.x < 0 || tetromino.x + shape[i][0] + dir.x >= COLS) {
          return true;
        }
        if (tetromino.y + shape[i][1] + dir.y < 0 || tetromino.y + shape[i][1] + dir.y >= ROWS) {
          return true;
        }
      }
      return false;
    }

    function placeTetromino(tetromino) {
      const shapes = [
        [
          [0, 0],
          [1, 0],
          [2, 0],
          [3, 0]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 1],
          [2, 1]
        ],
        [
          [0, 1],
          [1, 1],
          [2, 1],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [2, 1]
        ],
        [
          [1, 0],
          [2, 0],
          [0, 1],
          [1, 1]
        ],
        [
          [0, 0],
          [0, 1],
          [1, 0],
          [2, 0]
        ],
        [
          [0, 0],
          [1, 0],
          [1, 1],
          [1, 2]
        ]
      ];
      const shape = shapes[tetromino.type];
      for (let i = 0; i < shape.length; i++) {
        ctx.fillStyle = `hsl(${i * 10}, 100%, 50%)`;
        ctx.fillRect((tetromino.x + shape[i][0]) * CELL, (tetromino.y + shape[i][1]) * CELL, CELL, CELL);
      }
    }

    upBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') nextDir = {x: 0, y: -1};
    });
    downBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') nextDir = {x: 0, y: 1};
    });
    leftBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') nextDir = {x: -1, y: 0};
    });
    rightBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') nextDir = {x: 1, y: 0};
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' && dir.y !== 1) nextDir = {x: 0, y: -1};
      if (e.key === 'ArrowDown' && dir.y !== -1) nextDir = {x: 0, y: 1};
      if (e.key === 'ArrowLeft' && dir.x !== 1) nextDir = {x: -1, y: 0};
      if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = {x: 1, y: 0};
      if (e.key === 'w' && dir.y !== 1) nextDir = {x: 0, y: -1};
      if (e.key === 's' && dir.y !== -1) nextDir = {x: 0, y: 1};
      if (e.key === 'a' && dir.x !== 1) nextDir = {x: -1, y: 0};
      if (e.key === 'd' && dir.x !== -1) nextDir = {x: 1, y: 0};
    });

    canvas.addEventListener('click', () => {
      if (gameState === 'start') {
        gameState = 'playing';
        loop();
      } else if (gameState === 'gameover') {
        resetGame();
        loop();
      }
    });

    resetGame();
    draw();
  </script>
</body>
</html>
