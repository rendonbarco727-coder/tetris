<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    body {
      font-family: 'Press Start 2P', sans-serif;
      background-color: #1a1a2e;
    }
    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      margin: 40px auto;
    }
    #gameCanvas {
      border: 2px solid #39ff14;
      background-color: #1a1a2e;
    }
    #controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background-color: #333;
      color: #fff;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #444;
    }
    #score-display {
      font-size: 24px;
      color: #fff;
      margin-bottom: 10px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div id="game-container">
    <div id="score-display">Puntuación: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="controls">
      <button class="btn" id="up-btn">↑</button>
      <button class="btn" id="left-btn">←</button>
      <button class="btn" id="right-btn">→</button>
      <button class="btn" id="down-btn">↓</button>
    </div>
  </div>
  <script>
    const CELL = 20, COLS = 20, ROWS = 20;
    let snake, dir, nextDir, food, score, speed, gameState, animId;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score-display');
    const upBtn = document.getElementById('up-btn');
    const downBtn = document.getElementById('down-btn');
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    function resetGame() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0}; nextDir = {x:1,y:0};
      score = 0; speed = 150; gameState = 'start';
      spawnFood(); cancelAnimationFrame(animId);
    }

    function spawnFood() {
      do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
      while (snake.some(s=>s.x===food.x&&s.y===food.y));
    }

    let lastTime = 0;
    function loop(ts) {
      animId = requestAnimationFrame(loop);
      if (ts - lastTime < speed) return;
      lastTime = ts;
      dir = nextDir;
      const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};
      if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        gameState='gameover'; drawGameOver(); return;
      }
      snake.unshift(head);
      if (head.x===food.x&&head.y===food.y) { score+=10; speed=Math.max(60,speed-2); spawnFood(); }
      else snake.pop();
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (gameState === 'start') {
        drawStartScreen();
      } else if (gameState === 'gameover') {
        drawGameOver();
      } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        snake.forEach((s, i) => {
          const gradient = ctx.createLinearGradient(s.x*CELL, s.y*CELL, (s.x+1)*CELL, (s.y+1)*CELL);
          gradient.addColorStop(0, '#0f0');
          gradient.addColorStop(1, '#3f3');
          ctx.fillStyle = gradient;
          ctx.fillRect(s.x*CELL, s.y*CELL, CELL, CELL);
        });
        ctx.fillStyle = '#f00';
        ctx.beginPath();
        ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2, 0, 2*Math.PI);
        ctx.fill();
        scoreDisplay.textContent = `Puntuación: ${score}`;
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '48px Press Start 2P';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Tetris', canvas.width/2, canvas.height/2-50);
      ctx.font = '24px Press Start 2P';
      ctx.fillText('Toca para iniciar', canvas.width/2, canvas.height/2+50);
    }

    function drawGameOver() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = '48px Press Start 2P';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Game Over', canvas.width/2, canvas.height/2-50);
      ctx.font = '24px Press Start 2P';
      ctx.fillText(`Puntuación: ${score}`, canvas.width/2, canvas.height/2);
      ctx.font = '24px Press Start 2P';
      ctx.fillText('🔄 Reiniciar', canvas.width/2, canvas.height/2+50);
      canvas.addEventListener('click', () => {
        resetGame();
        loop();
      });
    }

    upBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') {
        nextDir = {x:0,y:-1};
      }
    });
    downBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') {
        nextDir = {x:0,y:1};
      }
    });
    leftBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') {
        nextDir = {x:-1,y:0};
      }
    });
    rightBtn.addEventListener('click', () => {
      if (gameState !== 'gameover') {
        nextDir = {x:1,y:0};
      }
    });

    document.addEventListener('keydown', (e) => {
      if (gameState !== 'gameover') {
        switch (e.key) {
          case 'ArrowUp':
            nextDir = {x:0,y:-1};
            break;
          case 'ArrowDown':
            nextDir = {x:0,y:1};
            break;
          case 'ArrowLeft':
            nextDir = {x:-1,y:0};
            break;
          case 'ArrowRight':
            nextDir = {x:1,y:0};
            break;
          case 'w':
            nextDir = {x:0,y:-1};
            break;
          case 's':
            nextDir = {x:0,y:1};
            break;
          case 'a':
            nextDir = {x:-1,y:0};
            break;
          case 'd':
            nextDir = {x:1,y:0};
            break;
        }
      }
    });

    resetGame();
    drawStartScreen();
    canvas.addEventListener('click', () => {
      if (gameState === 'start') {
        loop();
      }
    });
  </script>
</body>
</html>
